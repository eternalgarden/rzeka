<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Eris Discordia</title>
    <style>
        * {
            box-sizing: border-box;
        }

        /*
        why?
        https://www.fast.design/docs/fast-element/leveraging-css#hiding-undefined-elements
         */
        :not(:defined) {
            visibility: hidden;
        }

        @font-face {
            font-family: 'avara-bold';
            src: url('/fonts/Avara-Bold.otf');
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: #262626;
            background-size: cover;
            cursor: pointer;
            color: ghostwhite;
            font-size: 1em;
            font-family: 'avara-bold';
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        h2.title {
            margin-block-end: 0em;
            margin-block-start: 0em;
            text-align: right;
            margin-top: 0.2rem;
            margin-right: 0.4rem;
            font-family: 'avara-bold';
            font-size: 1rem;
        }

        #message-box>div {
            top: 30%;
            left: 45%;
        }

        div.background {
            position: absolute;
            margin: 0;
            height: 100vh;
            width: 100vw;
            backdrop-filter: blur(2px);
        }

        /* CURRENT GRID 🏔️ */
        /* https://grid.layoutit.com?id=3mnDW2K */

        .layout {
            display: grid;
            grid-template-columns: 0.2fr 1.8fr 0.1fr 2.7fr 0.2fr;
            grid-template-rows: 0.2fr 1.8fr 0.6fr 1.8fr 1.4fr 0.2fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            width: 100%;
            height: 100%;
        }

        .spells {
            grid-area: 4 / 3 / 6 / 5;
        }

        .heading {
            grid-area: 1 / 1 / 2 / 6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leftside {
            grid-area: 2 / 1 / 6 / 2;
        }

        .rightside {
            grid-area: 2 / 5 / 6 / 6;
        }

        .tree {
            grid-area: 2 / 4 / 5 / 5;
        }

        .footer {
            grid-area: 6 / 1 / 7 / 6;
        }

        .occurences {
            grid-area: 2 / 2 / 6 / 3;
            width: 420px;
        }

        /* END OF AUTOGEN */

        .layout {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #occurencesBox {
            overflow-y: scroll;
            min-height: 0;
            align-self: stretch;
            padding: 3px;
            background: rgba(52, 52, 52, 0.83);
            border: 1px solid rgba(156, 156, 156, 0.5);
        }
    </style>
</head>

<body>
    <div class="background"></div>

    <!-- made with https://grid.layoutit.com/ 🦄 -->
    <!-- https://css-tricks.com/snippets/css/complete-guide-grid/ -->
    <div class="layout">
        <div class="heading">
            <eris-connection-status></eris-connection-status>
            <h2 class="title">🌲🏕️ Eris' Realm of Rzeka 🎠🐛</h3>
        </div>
        <div id="occurencesBox" class="occurences">
            <eris-realm-events id="eris-realm-events">
            </eris-realm-events>
        </div>
        <div class="spells"></div>
        <div class="leftside"></div>
        <div class="rightside"></div>
        <div class="tree">
            <eris-causality-tree></eris-causality-tree>
        </div>
        <div class="footer"></div>
    </div>

    <usagi-happy></usagi-happy>
    <!-- <whdig-loader></whdig-loader> -->
    <!-- <image-loader></image-loader> -->

    <script type="module" src="/src/eris/eris.ts"></script>
</body>

</html>
